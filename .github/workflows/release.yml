name: Release

on:
  push:
    tags:
      - 'v*' # Trigger workflow on tags matching v*, e.g., v1.0.0, v2.1.3

jobs:
  release:
    runs-on: macos-latest

    permissions:
      contents: write # Important: Needed to create GitHub Releases

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build and Publish macOS app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Automatically provided by GitHub Actions
        run: |
          # 1. First run type checks
          npm run typecheck
          
          # 2. Build the vite project for electron
          npx electron-vite build
          
          # 3. Package into DMG and publish to GitHub Releases
          npx electron-builder --mac -p always
